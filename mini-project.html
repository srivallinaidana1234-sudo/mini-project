<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Deck Builder</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

h1{
    color:#ffcb05;
    text-shadow:2px 2px #2a75bb;
    margin-bottom:20px;
}

.search-box{
    margin-bottom:20px;
}

input{
    padding:10px;
    width:250px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    background:#2a75bb;
    color:white;
    cursor:pointer;
    margin-left:5px;
}

button:hover{
    background:#1b4f7a;
}

#pokemonContainer,
#deckContainer{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.card{
    width:200px;
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.card img{
    width:120px;
    height:120px;
}

.card h3{
    text-transform:capitalize;
    margin:10px 0;
}

.deck-card{
    border:3px solid #4CAF50;
}

.info{
    margin:5px 0;
}

h2{
    margin-top:40px;
}
</style>
</head>
<body>

<h1>Pokémon Deck Builder</h1>

<div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="Enter Pokémon name (pikachu)"
    >
    <button onclick="searchPokemon()">Search</button>
</div>

<div id="pokemonContainer"></div>

<h2>Your Deck (<span id="deckCount">0</span>/60)</h2>
<div id="deckContainer"></div>

<script>
const pokemonContainer = document.getElementById("pokemonContainer");
const deckContainer = document.getElementById("deckContainer");
const deckCount = document.getElementById("deckCount");

let deck = JSON.parse(localStorage.getItem("pokemonDeck")) || [];

renderDeck();

async function searchPokemon() {

    const searchValue = document
        .getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

    if (!searchValue) {
        alert("Enter a Pokémon name");
        return;
    }

    pokemonContainer.innerHTML = "<h3>Loading...</h3>";

    try {

        const response = await fetch(
            `https://pokeapi.co/api/v2/pokemon/${searchValue}`
        );

        if (!response.ok) {
            throw new Error("Pokémon not found");
        }

        const pokemon = await response.json();

        displayPokemon(pokemon);

    } catch(error) {

        pokemonContainer.innerHTML =
        `<h3 style="color:red">${error.message}</h3>`;
    }
}

function displayPokemon(pokemon) {

    pokemonContainer.innerHTML = `
        <div class="card">
            <img src="${pokemon.sprites.front_default}" alt="${pokemon.name}">
            <h3>${pokemon.name}</h3>

            <p class="info">ID: ${pokemon.id}</p>
            <p class="info">HP: ${pokemon.stats[0].base_stat}</p>
            <p class="info">
                Type:
                ${pokemon.types.map(t => t.type.name).join(", ")}
            </p>

            <button
                onclick="addToDeck(
                    ${pokemon.id},
                    '${pokemon.name}',
                    '${pokemon.sprites.front_default}'
                )">
                Add To Deck
            </button>
        </div>
    `;
}

function addToDeck(id, name, image) {

    if (deck.length >= 60) {
        alert("Deck limit reached (60 cards)");
        return;
    }

    const exists = deck.some(card => card.id === id);

    if (exists) {
        alert("Pokémon already in deck");
        return;
    }

    deck.push({
        id,
        name,
        image
    });

    saveDeck();
    renderDeck();
}

function removeFromDeck(id) {

    deck = deck.filter(card => card.id !== id);

    saveDeck();
    renderDeck();
}

function renderDeck() {

    deckContainer.innerHTML = "";

    deck.forEach(card => {

        const div = document.createElement("div");

        div.className = "card deck-card";

        div.innerHTML = `
            <img src="${card.image}" alt="${card.name}">
            <h3>${card.name}</h3>

            <button onclick="removeFromDeck(${card.id})">
                Remove
            </button>
        `;

        deckContainer.appendChild(div);
    });

    deckCount.textContent = deck.length;
}

function saveDeck() {
    localStorage.setItem(
        "pokemonDeck",
        JSON.stringify(deck)
    );
}

document
.getElementById("searchInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        searchPokemon();
    }
});
</script>

</body>
</html>
