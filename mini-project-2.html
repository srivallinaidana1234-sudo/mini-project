<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelance Invoice Generator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
color:#2c3e50;
}

.top{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
}

label{
font-weight:600;
}

.invoice-info{
background:#eef3ff;
padding:15px;
border-radius:10px;
}

.client{
background:#f9f9f9;
padding:15px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#3498db;
color:white;
padding:12px;
}

table td{
padding:10px;
border:1px solid #ddd;
}

table input{
margin:0;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.add-btn{
background:#2ecc71;
color:white;
margin-top:15px;
}

.delete-btn{
background:#e74c3c;
color:white;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
}

.pdf-btn{
background:#3498db;
color:white;
}

.save-btn{
background:#9b59b6;
color:white;
}

.total-box{
margin-top:20px;
text-align:right;
font-size:24px;
font-weight:bold;
color:#2c3e50;
}

@media(max-width:700px){
.top{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="container">

<h1>Freelance Invoice Generator</h1>

<div class="top">

<div class="invoice-info">
<h3>Invoice Details</h3>

<label>Invoice Number</label>
<input type="text" id="invoiceNo" readonly>

<label>Date</label>
<input type="date" id="invoiceDate">
</div>

<div class="client">
<h3>Client Details</h3>

<label>Client Name</label>
<input type="text" id="clientName">

<label>Email</label>
<input type="email" id="clientEmail">

<label>Company</label>
<input type="text" id="clientCompany">
</div>

</div>

<table id="invoiceTable">
<thead>
<tr>
<th>Service</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr>
<td>
<input type="text" class="service">
</td>

<td>
<input type="number" class="qty" value="1">
</td>

<td>
<input type="number" class="rate" value="0">
</td>

<td class="amount">0</td>

<td>
<button class="delete-btn" onclick="removeRow(this)">
X
</button>
</td>
</tr>
</tbody>
</table>

<button class="add-btn" onclick="addRow()">
+ Add Item
</button>

<div class="total-box">
Total : ₹ <span id="grandTotal">0</span>
</div>

<div class="actions">
<button class="save-btn" onclick="saveClient()">
Save Client
</button>

<button class="pdf-btn" onclick="window.print()">
Download PDF
</button>
</div>

</div>

<script>

document.getElementById("invoiceNo").value =
"INV-" + Math.floor(Math.random()*100000);

document.getElementById("invoiceDate").value =
new Date().toISOString().split("T")[0];

function addRow(){

let row = `
<tr>

<td>
<input type="text" class="service">
</td>

<td>
<input type="number" class="qty" value="1">
</td>

<td>
<input type="number" class="rate" value="0">
</td>

<td class="amount">0</td>

<td>
<button class="delete-btn"
onclick="removeRow(this)">X</button>
</td>

</tr>
`;

document.querySelector("#invoiceTable tbody")
.insertAdjacentHTML("beforeend",row);

attachEvents();
}

function removeRow(btn){
btn.parentElement.parentElement.remove();
calculateTotal();
}

function calculateTotal(){

let total = 0;

document.querySelectorAll("#invoiceTable tbody tr")
.forEach(row=>{

let qty = row.querySelector(".qty").value || 0;
let rate = row.querySelector(".rate").value || 0;

let amount = qty * rate;

row.querySelector(".amount").innerText =
amount.toFixed(2);

total += amount;

});

document.getElementById("grandTotal")
.innerText = total.toFixed(2);
}

function attachEvents(){

document.querySelectorAll(".qty,.rate")
.forEach(input=>{

input.removeEventListener("input",
calculateTotal);

input.addEventListener("input",
calculateTotal);

});

}

attachEvents();

function saveClient(){

let client = {

name:
document.getElementById("clientName").value,

email:
document.getElementById("clientEmail").value,

company:
document.getElementById("clientCompany").value

};

localStorage.setItem(
"savedClient",
JSON.stringify(client)
);

alert("Client Saved!");
}

window.onload = ()=>{

let client =
JSON.parse(
localStorage.getItem("savedClient")
);

if(client){

document.getElementById("clientName")
.value = client.name;

document.getElementById("clientEmail")
.value = client.email;

document.getElementById("clientCompany")
.value = client.company;
}

calculateTotal();

};

</script>

</body>
</html>
